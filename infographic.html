<!doctype html><html lang="th"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>น้ำเจ้าพระยา → อินทร์บุรี</title><style>body{font-family:system-ui,'Noto Sans Thai',sans-serif;margin:0;background:#f6fbff;color:#102033}.wrap{max-width:980px;margin:auto;padding:24px}.card{background:white;border-radius:22px;padding:20px;margin:14px 0;box-shadow:0 8px 30px #0001}.route{display:grid;grid-template-columns:repeat(5,1fr);gap:8px;align-items:center}.st{padding:12px;border-radius:16px;background:#e9f5ff;text-align:center;font-weight:700}.arrow{text-align:center;font-size:28px}.risk{font-size:32px;font-weight:900}.bar{height:20px;border-radius:999px;background:linear-gradient(90deg,#23c55e,#eab308,#f97316,#ef4444);}.small{color:#526070}</style></head><body><div class="wrap"><h1>ระบบติดตามน้ำเจ้าพระยา → อินทร์บุรี</h1><div class="card"><div class="risk" id="risk">กำลังโหลดข้อมูล...</div><p id="explain"></p><div class="bar"></div><p class="small">สีเขียว=ปกติ เหลือง=ติดตาม ส้ม=เฝ้าระวัง แดง=อันตราย</p></div><div class="card"><h2>เส้นทางน้ำ</h2><div class="route"><div class="st">นครสวรรค์<br>C.2</div><div class="arrow">→</div><div class="st">ชัยนาท<br>C.13</div><div class="arrow">→</div><div class="st">อินทร์บุรี</div></div><p id="eta"></p></div><div class="card"><h2>ข้อมูลหลัก</h2><pre id="raw"></pre></div></div><script>fetch(new URLSearchParams(location.search).get('data') || 'outputs/inburi_report.json').then(r=>r.json()).then(j=>{document.getElementById('risk').textContent=(j.risk?.emoji||'')+' '+(j.risk?.level||'ไม่ทราบ');document.getElementById('explain').textContent=j.public_explain||j.caption||'';document.getElementById('eta').textContent=j.water_mass?.eta_window_text||'';document.getElementById('raw').textContent=JSON.stringify({level:j.observation?.level_msl,q:j.observation?.discharge_cms,forecast:j.forecast,confidence:j.validation?.confidence},null,2)}).catch(()=>{document.getElementById('risk').textContent='ยังไม่พบ outputs/inburi_report.json — ให้รัน python main_water.py ก่อน'});</script></body></html>
